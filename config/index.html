<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Config Βαγονιών</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
  :root {
    --bg:#F5F4F0;--surface:#FFF;--border:#E2E0D8;--border-strong:#C8C5BA;
    --text:#1A1916;--muted:#7A786E;--hint:#A8A69E;
    --accent:#2D6A4F;--accent-bg:#E8F4EE;
    --danger:#C0392B;--danger-bg:#FDEDEC;
    --rs:8px;--font:'DM Sans',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:3rem;}

  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 1.25rem;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;}
  .header h1{font-size:17px;font-weight:600;}
  .header-right{display:flex;gap:8px;align-items:center;}
  .save-btn{font-family:var(--font);font-size:14px;font-weight:600;padding:8px 20px;border-radius:var(--rs);border:none;background:var(--accent);color:#fff;cursor:pointer;}
  .save-btn:active{opacity:0.85;}
  .save-btn:disabled{opacity:0.5;cursor:default;}
  .status{font-size:12px;color:var(--muted);}

  .board{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;padding:1rem;}

  .col{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;}
  .col-header{padding:0.75rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .col-title{font-size:14px;font-weight:600;}
  .col-count{font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;background:var(--accent-bg);color:var(--accent);}
  .col-apothiki .col-count{background:var(--bg);color:var(--muted);border:1px solid var(--border);}
  .drop-zone{flex:1;min-height:120px;padding:8px;display:flex;flex-direction:column;gap:6px;transition:background 0.15s;}
  .drop-zone.drag-over{background:var(--accent-bg);}
  .vagoni-chip{background:var(--bg);border:1px solid var(--border-strong);border-radius:6px;padding:6px 10px;font-size:13px;font-weight:600;cursor:grab;user-select:none;display:flex;align-items:center;justify-content:space-between;transition:box-shadow 0.15s,opacity 0.15s;}
  .vagoni-chip:active{cursor:grabbing;}
  .vagoni-chip.dragging{opacity:0.4;}
  .add-row{padding:8px;border-top:1px solid var(--border);display:flex;gap:6px;}
  .add-input{flex:1;font-family:var(--font);font-size:13px;border:1.5px solid var(--border-strong);border-radius:6px;padding:6px 8px;outline:none;background:var(--bg);}
  .add-input:focus{border-color:var(--accent);}
  .add-btn{font-family:var(--font);font-size:13px;font-weight:600;padding:6px 12px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;}

  /* CLEAR SECTION */
  .sec-label{font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);padding:1rem 1rem 0.4rem;}
  .clear-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin:0 1rem 1rem;padding:1.25rem;display:flex;flex-direction:column;gap:1rem;}
  .clear-row{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap;}
  .clear-label{font-size:13px;font-weight:600;color:var(--text);min-width:80px;padding-top:8px;}
  .koin-checks{display:flex;gap:6px;flex-wrap:wrap;}
  .koin-check{display:flex;align-items:center;gap:4px;font-size:13px;background:var(--bg);border:1px solid var(--border-strong);border-radius:6px;padding:5px 10px;cursor:pointer;user-select:none;}
  .koin-check input{cursor:pointer;}
  .koin-check.selected{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);font-weight:600;}
  .date-input{font-family:var(--font);font-size:13px;color:var(--text);background:var(--bg);border:1.5px solid var(--border-strong);border-radius:6px;padding:6px 8px;outline:none;}
  .date-input:focus{border-color:var(--accent);}
  .clear-btn{font-family:var(--font);font-size:13px;font-weight:600;padding:8px 18px;border-radius:var(--rs);border:none;background:var(--danger);color:#fff;cursor:pointer;}
  .clear-btn:active{opacity:0.85;}
  .clear-btn:disabled{opacity:0.5;cursor:default;}
  .clear-status{font-size:12px;color:var(--muted);margin-top:4px;}

  /* CONFIRM MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:500;display:flex;align-items:center;justify-content:center;display:none;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border-radius:12px;padding:1.5rem;max-width:340px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.15);}
  .modal h2{font-size:16px;font-weight:600;margin-bottom:0.5rem;}
  .modal p{font-size:13px;color:var(--muted);margin-bottom:1.25rem;line-height:1.5;}
  .modal-btns{display:flex;gap:8px;justify-content:flex-end;}
  .modal-cancel{font-family:var(--font);font-size:13px;padding:8px 16px;border-radius:var(--rs);border:1px solid var(--border-strong);background:transparent;color:var(--muted);cursor:pointer;}
  .modal-confirm{font-family:var(--font);font-size:13px;font-weight:600;padding:8px 16px;border-radius:var(--rs);border:none;background:var(--danger);color:#fff;cursor:pointer;}

  .loading{text-align:center;padding:3rem;color:var(--muted);}
</style>
</head>
<body>

<div class="header">
  <h1>Config Βαγονιών</h1>
  <div class="header-right">
    <span class="status" id="status"></span>
    <button class="save-btn" id="save-btn" onclick="saveAll()">Αποθήκευση</button>
  </div>
</div>

<div id="board" class="board"><div class="loading">Φόρτωση...</div></div>

<!-- CLEAR SECTION -->
<div class="sec-label">Διαγραφή Δεδομένων</div>
<div class="clear-card">

  <!-- Κοινότητες -->
  <div class="clear-row">
    <span class="clear-label">Κοινότητες</span>
    <div class="koin-checks" id="koin-checks">
      <label class="koin-check" id="chk-all">
        <input type="checkbox" id="cb-all" onchange="toggleAll(this)"> Όλες
      </label>
      <!-- filled by JS -->
    </div>
  </div>

  <!-- Μια μέρα -->
  <div class="clear-row">
    <span class="clear-label">Μία μέρα</span>
    <input type="date" class="date-input" id="clear-single-date">
    <button class="clear-btn" onclick="confirmClear('single')">Διαγραφή</button>
  </div>

  <!-- Range -->
  <div class="clear-row">
    <span class="clear-label">Εύρος</span>
    <input type="date" class="date-input" id="clear-from">
    <span style="font-size:13px;color:var(--muted);padding-top:8px;">έως</span>
    <input type="date" class="date-input" id="clear-to">
    <button class="clear-btn" onclick="confirmClear('range')">Διαγραφή</button>
  </div>

  <div class="clear-status" id="clear-status"></div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Επιβεβαίωση Διαγραφής</h2>
    <p id="modal-msg"></p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Ακύρωση</button>
      <button class="modal-confirm" onclick="executeClear()">Διαγραφή</button>
    </div>
  </div>
</div>

<script>
const SB_URL = "https://neyybmgplyxnkangafkf.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5leXlibWdwbHl4bmthbmdhZmtmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NTQ4NjQsImV4cCI6MjA5MzEzMDg2NH0.NqyrMsDh52GGn2DRFmj9IecMFpPIzFFfPByLg4fQBKg";
const SBH = {"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json"};
const ORDER = ["4Δ","4Μ","3Μ","3Δ","5αρια","6αρια"];

let state = {};
let dragEl = null, dragFrom = null;
let pendingClear = null;

// ── VAGONIA BOARD ───────────────────────────────────────────────────────────
async function load() {
  const r = await fetch(SB_URL + "/rest/v1/config?select=koinotita,vagonia", {headers: SBH});
  const rows = await r.json();
  ORDER.forEach(k => state[k] = []);
  state["__apothiki"] = [];
  if (rows && rows.length) {
    rows.forEach(r => { if (state[r.koinotita] !== undefined) state[r.koinotita] = r.vagonia || []; });
  }
  render();
  buildKoinChecks();
}

function render() {
  const board = document.getElementById("board");
  board.innerHTML = "";
  [...ORDER, "__apothiki"].forEach(k => board.appendChild(makeCol(k)));
}

function makeCol(k) {
  const isApothiki = k === "__apothiki";
  const label = isApothiki ? "Αποθήκη" : k;
  const items = state[k] || [];
  const col = document.createElement("div");
  col.className = "col" + (isApothiki ? " col-apothiki" : "");
  col.innerHTML = `
    <div class="col-header">
      <span class="col-title">${label}</span>
      <span class="col-count">${items.length}</span>
    </div>
    <div class="drop-zone" id="zone-${k}" data-col="${k}"></div>
    <div class="add-row">
      <input class="add-input" type="number" placeholder="Νέο βαγόνι" id="inp-${k}"
        onkeydown="if(event.key==='Enter') addVagoni('${k}')">
      <button class="add-btn" onclick="addVagoni('${k}')">+</button>
    </div>`;
  const zone = col.querySelector(".drop-zone");
  items.forEach(v => zone.appendChild(makeChip(v, k)));
  setupZone(zone);
  return col;
}

function makeChip(v, col) {
  const chip = document.createElement("div");
  chip.className = "vagoni-chip";
  chip.textContent = v;
  chip.draggable = true;
  chip.dataset.vagoni = v;
  chip.dataset.col = col;
  chip.addEventListener("dragstart", e => {
    dragEl = chip; dragFrom = col;
    setTimeout(() => chip.classList.add("dragging"), 0);
    e.dataTransfer.effectAllowed = "move";
  });
  chip.addEventListener("dragend", () => {
    chip.classList.remove("dragging");
    dragEl = null; dragFrom = null;
    document.querySelectorAll(".drag-over").forEach(z => z.classList.remove("drag-over"));
  });
  chip.addEventListener("touchstart", touchStart, {passive:true});
  chip.addEventListener("touchmove", touchMove, {passive:false});
  chip.addEventListener("touchend", touchEnd);
  return chip;
}

function setupZone(zone) {
  zone.addEventListener("dragover", e => { e.preventDefault(); zone.classList.add("drag-over"); });
  zone.addEventListener("dragleave", () => zone.classList.remove("drag-over"));
  zone.addEventListener("drop", e => {
    e.preventDefault(); zone.classList.remove("drag-over");
    if (!dragEl) return;
    const toCol = zone.dataset.col;
    const v = parseInt(dragEl.dataset.vagoni);
    state[dragFrom] = state[dragFrom].filter(x => x !== v);
    if (!state[toCol].includes(v)) state[toCol].push(v);
    render();
  });
}

function addVagoni(col) {
  const inp = document.getElementById("inp-" + col);
  const v = parseInt(inp.value);
  if (!v || isNaN(v)) return;
  Object.keys(state).forEach(k => { state[k] = state[k].filter(x => x !== v); });
  state[col].push(v);
  inp.value = "";
  render();
  setStatus("Μη αποθηκευμένες αλλαγές");
}

async function saveAll() {
  const btn = document.getElementById("save-btn");
  btn.disabled = true; setStatus("Αποθήκευση...");
  const rows = ORDER.map(k => ({koinotita: k, vagonia: state[k], updated_at: new Date().toISOString()}));
  const r = await fetch(SB_URL + "/rest/v1/config?on_conflict=koinotita", {
    method: "POST", headers: {...SBH, "Prefer": "resolution=merge-duplicates"}, body: JSON.stringify(rows)
  });
  btn.disabled = false;
  if (r.ok) { setStatus("✓ Αποθηκεύτηκε"); setTimeout(() => setStatus(""), 3000); }
  else setStatus("❌ Σφάλμα αποθήκευσης");
}

function setStatus(msg) { document.getElementById("status").textContent = msg; }

// ── TOUCH ───────────────────────────────────────────────────────────────────
let touchChip = null, touchCol = null, touchClone = null;
function touchStart(e) {
  touchChip = e.currentTarget; touchCol = touchChip.dataset.col;
  touchClone = touchChip.cloneNode(true);
  touchClone.style.cssText = `position:fixed;opacity:0.7;pointer-events:none;z-index:9999;width:${touchChip.offsetWidth}px;`;
  document.body.appendChild(touchClone);
}
function touchMove(e) {
  e.preventDefault();
  const t = e.touches[0];
  if (touchClone) { touchClone.style.left=(t.clientX-40)+"px"; touchClone.style.top=(t.clientY-20)+"px"; }
  document.querySelectorAll(".drag-over").forEach(z => z.classList.remove("drag-over"));
  const zone = document.elementFromPoint(t.clientX, t.clientY)?.closest(".drop-zone");
  if (zone) zone.classList.add("drag-over");
}
function touchEnd(e) {
  if (touchClone) { touchClone.remove(); touchClone = null; }
  document.querySelectorAll(".drag-over").forEach(z => z.classList.remove("drag-over"));
  const t = e.changedTouches[0];
  const zone = document.elementFromPoint(t.clientX, t.clientY)?.closest(".drop-zone");
  if (zone && touchChip) {
    const toCol = zone.dataset.col, v = parseInt(touchChip.dataset.vagoni);
    state[touchCol] = state[touchCol].filter(x => x !== v);
    if (!state[toCol].includes(v)) state[toCol].push(v);
    render();
  }
  touchChip = null; touchCol = null;
}

// ── CLEAR DATA ──────────────────────────────────────────────────────────────
function buildKoinChecks() {
  const cont = document.getElementById("koin-checks");
  // Keep "Όλες" checkbox, add individual ones
  ORDER.forEach(k => {
    const lbl = document.createElement("label");
    lbl.className = "koin-check";
    lbl.id = "chk-" + k;
    lbl.innerHTML = `<input type="checkbox" id="cb-${k}" onchange="updateAllCheck()"> ${k}`;
    cont.appendChild(lbl);
  });
}

function toggleAll(cb) {
  ORDER.forEach(k => {
    document.getElementById("cb-" + k).checked = cb.checked;
    document.getElementById("chk-" + k).classList.toggle("selected", cb.checked);
  });
  document.getElementById("chk-all").classList.toggle("selected", cb.checked);
}

function updateAllCheck() {
  const all = ORDER.every(k => document.getElementById("cb-" + k).checked);
  document.getElementById("cb-all").checked = all;
  document.getElementById("chk-all").classList.toggle("selected", all);
  ORDER.forEach(k => {
    document.getElementById("chk-" + k).classList.toggle("selected", document.getElementById("cb-" + k).checked);
  });
}

function getSelectedKoinotites() {
  return ORDER.filter(k => document.getElementById("cb-" + k).checked);
}

function confirmClear(mode) {
  const koin = getSelectedKoinotites();
  if (!koin.length) { setClearStatus("Επίλεξε τουλάχιστον μία κοινότητα"); return; }

  let dateFrom, dateTo, msg;
  if (mode === "single") {
    dateFrom = document.getElementById("clear-single-date").value;
    if (!dateFrom) { setClearStatus("Επίλεξε ημερομηνία"); return; }
    dateTo = dateFrom;
    const d = new Date(dateFrom);
    msg = `Θα διαγραφούν τα δεδομένα της <b>${d.getDate()}/${d.getMonth()+1}</b> για: <b>${koin.join(", ")}</b>`;
  } else {
    dateFrom = document.getElementById("clear-from").value;
    dateTo = document.getElementById("clear-to").value;
    if (!dateFrom || !dateTo) { setClearStatus("Επίλεξε εύρος ημερομηνιών"); return; }
    if (dateFrom > dateTo) { setClearStatus("Η αρχή πρέπει να είναι πριν το τέλος"); return; }
    const df = new Date(dateFrom), dt = new Date(dateTo);
    msg = `Θα διαγραφούν τα δεδομένα από <b>${df.getDate()}/${df.getMonth()+1}</b> έως <b>${dt.getDate()}/${dt.getMonth()+1}</b> για: <b>${koin.join(", ")}</b>`;
  }

  pendingClear = {koin, dateFrom, dateTo};
  document.getElementById("modal-msg").innerHTML = msg;
  document.getElementById("modal").classList.add("open");
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
  pendingClear = null;
}

async function executeClear() {
  if (!pendingClear) return;
  closeModal();
  const {koin, dateFrom, dateTo} = pendingClear;
  setClearStatus("Διαγραφή...");

  let errors = 0;
  for (const k of koin) {
    const url = `${SB_URL}/rest/v1/anafores?koinotita=eq.${encodeURIComponent(k)}&imerominia=gte.${dateFrom}&imerominia=lte.${dateTo}`;
    const r = await fetch(url, {method: "DELETE", headers: SBH});
    if (!r.ok) errors++;
  }

  if (errors === 0) setClearStatus("✓ Διαγράφηκαν επιτυχώς");
  else setClearStatus(`❌ Σφάλμα σε ${errors} κοινότητες`);
  setTimeout(() => setClearStatus(""), 4000);
}

function setClearStatus(msg) { document.getElementById("clear-status").textContent = msg; }

load();
</script>
</body>
</html>
