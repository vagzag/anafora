<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Αναφορά Κατασκήνωσης</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',system-ui,sans-serif;background:#F5F4F0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
  h1{font-size:20px;font-weight:600;color:#1A1916;margin-bottom:0.5rem;text-align:center;}
  p{font-size:14px;color:#7A786E;margin-bottom:2rem;text-align:center;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:320px;}
  a{display:block;background:#fff;border:1px solid #E2E0D8;border-radius:12px;padding:1.25rem;text-align:center;text-decoration:none;color:#1A1916;font-weight:600;font-size:16px;}
  a span{display:block;font-size:11px;font-weight:400;color:#7A786E;margin-top:4px;}
</style>
</head>
<body>
  <h1>Αναφορά Κατασκήνωσης</h1>
  <p>Επίλεξε την κοινότητά σου</p>
  <div class="grid">
    <a href="3d/">3Δ</a>
    <a href="3m/">3Μ</a>
    <a href="4d/">4Δ</a>
    <a href="4m/">4Μ</a>
    <a href="5aria/">5αρια</a>
    <a href="6aria/">6αρια</a>
  </div>
</body>
</html>
